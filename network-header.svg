<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 44px; font-weight: 800; fill: #ffffff; text-anchor: middle; letter-spacing: 1.5px; }
      .text-sub { font-family: 'Courier New', monospace; font-size: 22px; fill: #58a6ff; text-anchor: middle; animation: blink 2s infinite; }
      .node { fill: #58a6ff; }
      .link { stroke: #30363d; stroke-width: 1.5; }
      .link-active { stroke: #1f6feb; stroke-width: 2; opacity: 0.6; animation: dash 3s linear infinite; }
      
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes dash { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
      
      .glow-node { animation: nodeGlow 2s ease-in-out infinite alternate; }
      @keyframes nodeGlow { 
        from { r: 4; fill: #1f6feb; filter: drop-shadow(0 0 2px #1f6feb); } 
        to { r: 6.5; fill: #58a6ff; filter: drop-shadow(0 0 8px #58a6ff); } 
      }
    </style>
  </defs>
  
  <rect class="bg" width="100%" height="100%" rx="12" />

  <!-- Grid of nodes - 5 columns, 3 rows -->
  <!-- Col 1 -->
  <line class="link" x1="100" y1="50" x2="250" y2="125" />
  <line class="link-active" x1="100" y1="125" x2="250" y2="125" stroke-dasharray="10, 5" />
  <line class="link" x1="100" y1="200" x2="250" y2="125" />
  <line class="link" x1="100" y1="50" x2="250" y2="50" />
  <line class="link" x1="100" y1="200" x2="250" y2="200" />
  
  <!-- Col 2 to Col 3 -->
  <line class="link" x1="250" y1="50" x2="400" y2="50" />
  <line class="link" x1="250" y1="50" x2="400" y2="125" />
  <line class="link-active" x1="250" y1="125" x2="400" y2="50" stroke-dasharray="5, 10" />
  <line class="link" x1="250" y1="125" x2="400" y2="125" />
  <line class="link" x1="250" y1="125" x2="400" y2="200" />
  <line class="link" x1="250" y1="200" x2="400" y2="125" />
  <line class="link" x1="250" y1="200" x2="400" y2="200" />
  
  <!-- Col 3 to Col 4 -->
  <line class="link" x1="400" y1="50" x2="550" y2="50" />
  <line class="link" x1="400" y1="50" x2="550" y2="125" />
  <line class="link" x1="400" y1="125" x2="550" y2="50" />
  <line class="link" x1="400" y1="125" x2="550" y2="125" />
  <line class="link-active" x1="400" y1="125" x2="550" y2="200" stroke-dasharray="10, 10" />
  <line class="link" x1="400" y1="200" x2="550" y2="125" />
  <line class="link" x1="400" y1="200" x2="550" y2="200" />
  
  <!-- Col 4 to Col 5 -->
  <line class="link" x1="550" y1="50" x2="700" y2="50" />
  <line class="link" x1="550" y1="50" x2="700" y2="125" />
  <line class="link" x1="550" y1="125" x2="700" y2="125" />
  <line class="link-active" x1="550" y1="200" x2="700" y2="125" stroke-dasharray="8, 4" />
  <line class="link" x1="550" y1="200" x2="700" y2="200" />

  <!-- Nodes (Glowing) -->
  <circle class="node glow-node" cx="100" cy="50" style="animation-delay: 0.1s" />
  <circle class="node glow-node" cx="100" cy="125" style="animation-delay: 0.5s" />
  <circle class="node glow-node" cx="100" cy="200" style="animation-delay: 0.9s" />
  
  <circle class="node glow-node" cx="250" cy="50" style="animation-delay: 0.3s" />
  <circle class="node glow-node" cx="250" cy="125" style="animation-delay: 0.7s" />
  <circle class="node glow-node" cx="250" cy="200" style="animation-delay: 1.1s" />
  
  <circle class="node glow-node" cx="400" cy="50" style="animation-delay: 0.2s" />
  <circle class="node glow-node" cx="400" cy="125" style="animation-delay: 0.6s" />
  <circle class="node glow-node" cx="400" cy="200" style="animation-delay: 1.0s" />
  
  <circle class="node glow-node" cx="550" cy="50" style="animation-delay: 0.4s" />
  <circle class="node glow-node" cx="550" cy="125" style="animation-delay: 0.8s" />
  <circle class="node glow-node" cx="550" cy="200" style="animation-delay: 1.2s" />
  
  <circle class="node glow-node" cx="700" cy="50" style="animation-delay: 0.1s" />
  <circle class="node glow-node" cx="700" cy="125" style="animation-delay: 0.5s" />
  <circle class="node glow-node" cx="700" cy="200" style="animation-delay: 0.9s" />

  <!-- Center Blur / Overlay so text pops -->
  <rect x="120" y="60" width="560" height="130" fill="#0d1117" opacity="0.85" rx="15" />

  <!-- Text -->
  <text class="text-title" x="400" y="125">Padmaja Kachare</text>
  <text class="text-sub" x="400" y="165">&gt; Training in Progress_</text>
</svg>
